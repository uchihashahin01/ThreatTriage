title: Suspicious PowerShell Execution
id: powershell-01
status: stable
level: critical
description: Detects suspicious PowerShell commands commonly used in attacks
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1027
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    - '-EncodedCommand'
    - '-ExecutionPolicy Bypass'
    - 'Invoke-Expression'
    - 'IEX('
    - 'Invoke-WebRequest'
    - 'DownloadString'
    - 'DownloadFile'
    - 'New-Object Net.WebClient'
    - 'System.Reflection.Assembly'
    - 'FromBase64String'
    - '-nop -w hidden'
    - '-WindowStyle Hidden'
  condition: selection
